name: Update Puddleford Wiki

on:
  schedule:
    # Run every Monday at 08:00 UTC (day after typical Friday release)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Run wiki updater
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 scripts/update_wiki.py

      - name: Generate static episode pages
        run: python3 scripts/generate_episode_pages.py

      - name: Commit updated wiki data and episode pages
        run: |
          git config user.name "Puddleford Wiki Bot"
          git config user.email "ttfnrob@gmail.com"
          git add data/wiki.json data/transcripts/ data/episode-stats/ \
                  data/episode-slugs.json data/episode-index.json episodes/ sitemap-episodes.xml
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update wiki + regenerate episode pages [skip ci]"
            git pull --rebase origin main
            git push
          fi
